<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Form</title>
</head>
<body>
        <header>
        <h1>Learing Form</h1>
        <nav>
            <div>
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Services</a>
                <a href="#">Contact</a>
            </div>
        </nav>
    </header>
    <main>
        <div>
            <section>
                <h2>My Form</h2>
                <div>
                    <form action="">
                        <div>
                            <label for="name">Name</label>
                            <input type="text" min="3" max="9" id="name" name="name" required>
                        </div>
                        <div>
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div>
                            <label for="contry">Country</label>
                            <select name="country" id="country">
                                <option value="usa">USA</option>
                                <option value="canada">Canada</option>
                                <option value="uk">UK</option>
                                <option value="australia">Australia</option>
                            </select>
                        </div>
                        <div>
                            <label for="gender">Gender</label>
                            <label for="male">
                                <input type="radio" name="gender" id="male" value="male">
                                Male
                            </label>
                            <label for="female">
                                <input type="radio" name="gender" id="female" value="female">
                                Female
                            </label>
                        </div>

                        <div>
                            <div>
                                <label for="skills">Skills</label>
                            </div>
                            <div>
                                 <label for="html">Html</label>
                            <input type="checkbox" name="html" id="html" value="html">
                            </div>

                            <div>
                                <label for="css">Css</label>
                                <input type="checkbox" name="css" id="css" value="css">
                            </div>

                            <div>
                                <label for="js">JavaScript</label>
                                <input type="checkbox" name="js" id="js" value="js">
                            </div>
                        </div>
                        <button type="submit">Send</button>
                    </form>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
